use_default_settings: true

general:
  debug: false
  instance_name: "Local LLM Hub Search"

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "llm-hub-local-searxng-change-before-public-exposure"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  pool_connections: 50
  pool_maxsize: 10
  useragent_suffix: "llm-hub"
