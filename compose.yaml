name: llm-hub

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - litellm-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 10

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    restart: unless-stopped
    network_mode: host
    command: ["--config", "/app/config.yaml", "--host", "127.0.0.1", "--port", "4010"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@127.0.0.1:5433/litellm
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  open-webui:
    image: llm-hub-open-webui:0.9.2-file-context
    build:
      context: ./open-webui
    restart: unless-stopped
    network_mode: host
    environment:
      WEBUI_NAME: Local LLM Hub
      WEBUI_URL: ${PUBLIC_WEBUI_URL}
      PORT: "3000"
      WEBUI_AUTH: "True"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD}
      ENABLE_SIGNUP: "False"
      ENABLE_EVALUATION_ARENA_MODELS: "False"
      ENABLE_OLLAMA_API: "False"
      OPENAI_API_BASE_URL: http://127.0.0.1:4010/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      DEFAULT_MODELS: qwen3.6-27b
      AIOHTTP_CLIENT_TIMEOUT_MODEL_LIST: "30"
      SMALL_FILE_FULL_CONTEXT_MAX_BYTES: "131072"
      RAG_TOP_K: "6"
      CHUNK_SIZE: "1200"
      CHUNK_OVERLAP: "150"
      RAG_FULL_CONTEXT: "False"
      ENABLE_WEB_SEARCH: "True"
      WEB_SEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: ${SEARXNG_QUERY_URL:-http://127.0.0.1:8082/search}
      SEARXNG_LANGUAGE: all
      WEB_SEARCH_RESULT_COUNT: "3"
      BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL: "False"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - litellm
      - searxng

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:8082/
      UWSGI_WORKERS: "2"
      UWSGI_THREADS: "4"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - open-webui
      - litellm

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate --url http://127.0.0.1:8090
    depends_on:
      - caddy

volumes:
  litellm-postgres:
  open-webui-data:
